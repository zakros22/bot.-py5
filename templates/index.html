<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مترجم الملفات - دعم اللهجات العربية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
        }

        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: #e8eaf6;
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }

        .dialect-group {
            margin-bottom: 25px;
        }

        .dialect-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .supported-formats {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 مترجم الملفات</h1>
        <div class="subtitle">ترجمة ملفاتك إلى اللهجات العربية</div>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <p>انقر لاختيار ملف أو اسحبه هنا</p>
            <p style="font-size: 12px; color: #888; margin-top: 10px;">الأنواع المدعومة: TXT, DOCX</p>
        </div>

        <input type="file" id="fileInput" accept=".txt,.docx">

        <div class="file-info" id="fileInfo">
            📄 <span id="fileName"></span>
        </div>

        <div class="dialect-group">
            <label>🎭 اختر اللهجة:</label>
            <select id="dialect">
                {% for code, dialect in dialects.items() %}
                <option value="{{ code }}">{{ dialect.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button onclick="translateFile()" id="translateBtn">🚀 ترجمة الملف</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">جاري الترجمة...</p>
        </div>

        <div class="message" id="message"></div>

        <div class="supported-formats">
            💡 يدعم الملفات النصية (.txt) وملفات Word (.docx)
        </div>
    </div>

    <script>
        let selectedFile = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('fileName').textContent = selectedFile.name;
                document.getElementById('fileInfo').style.display = 'block';
            }
        });

        async function translateFile() {
            if (!selectedFile) {
                showMessage('الرجاء اختيار ملف أولاً', 'error');
                return;
            }

            const dialect = document.getElementById('dialect').value;
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('dialect', dialect);

            document.getElementById('translateBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            hideMessage();

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    // تحميل الملف تلقائياً
                    window.location.href = data.download_url;
                    // إعادة تعيين
                    setTimeout(() => {
                        selectedFile = null;
                        document.getElementById('fileInput').value = '';
                        document.getElementById('fileInfo').style.display = 'none';
                    }, 3000);
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('حدث خطأ في الاتصال بالخادم', 'error');
            } finally {
                document.getElementById('translateBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function hideMessage() {
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'none';
        }
    </script>
</body>
</html>
